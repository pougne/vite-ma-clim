name: vite-ma-clim

on:
  schedule:
    - cron: "*/15 * * * *"        # toutes les 15 minutes
  workflow_dispatch: {}          # bouton "Run workflow" manuel

# Un seul passage à la fois.
concurrency:
  group: vite-ma-clim
  cancel-in-progress: false

permissions:
  contents: write                # pour réécrire state.json
  pages: write                   # pour publier le dashboard
  id-token: write

jobs:
  watch:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run Vite Ma Clim
        env:
          VMC_NTFY_TOPIC: ${{ secrets.VMC_NTFY_TOPIC }}
          VMC_HOME_LAT: ${{ secrets.VMC_HOME_LAT }}
          VMC_HOME_LON: ${{ secrets.VMC_HOME_LON }}
        run: python clim_watch.py

      - name: Prepare site
        run: |
          mkdir -p site
          cp dashboard.html site/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4

      - name: Persist state
        run: |
          git config user.name "vite-ma-clim-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "update state [skip ci]" || echo "rien à committer"
          git push || echo "rien à pousser"
