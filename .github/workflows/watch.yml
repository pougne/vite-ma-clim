name: vite-ma-clim

on:
  schedule:
    - cron: "7,27,47 * * * *"   # filet de sécurité GitHub (le pinger cron-job.org pilote la vraie cadence)
  workflow_dispatch: {}
  push:
    branches: [master]

concurrency:
  group: vite-ma-clim
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  watch:
    runs-on: ubuntu-latest
    # Doit matcher la version de playwright dans requirements.txt (bumper les DEUX ensemble).
    container: mcr.microsoft.com/playwright/python:v1.61.0-jammy
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install -r requirements.txt || pip install --break-system-packages -r requirements.txt

      - name: Run Vite Ma Clim
        env:
          VMC_NTFY_TOPIC: ${{ secrets.VMC_NTFY_TOPIC }}
        run: python clim_watch.py

      - name: Prepare site
        run: |
          mkdir -p site
          cp dashboard.html site/index.html
          cp -f icon.png manifest.webmanifest site/ 2>/dev/null || true

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4

      - name: Persist state
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "vite-ma-clim-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "update state [skip ci]" || echo "rien à committer"
          git push || echo "rien à pousser"
